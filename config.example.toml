# Magpie orchestrator configuration.
#
# Copy this file to `config.toml` (repo-root, git-ignored) and fill it in, or
# point MAGPIE_CONFIG at a config file living elsewhere. See packages/orchestrator/src/config.ts
# for the loader that parses and validates this file.
#
# ---------------------------------------------------------------------------
# Secrets — deliberately kept OUT of this file and read from the environment
# instead, so `config.toml` never needs to hold anything sensitive:
#
#   MAGPIE_WEBHOOK_SECRET     (required) GitHub App webhook secret, used to
#                             verify the X-Hub-Signature-256 header on
#                             incoming webhook deliveries.
#
#   MAGPIE_GITHUB_PRIVATE_KEY (optional) PEM contents of the GitHub App
#                             private key. If set, this takes priority over
#                             `github.private_key_path` below and the file on
#                             disk is never read. Useful for containerized or
#                             CI deployments where mounting a PEM file is
#                             awkward.
#
#   MAGPIE_GATEWAY_MASTER_KEY (required) Bearer token this orchestrator uses to
#                             authenticate to the LLM gateway's management
#                             plane when minting/revoking each job's virtual
#                             key (see [gateway] below and gateway.ts). It must
#                             be the SAME value the gateway process itself is
#                             started with as its own MAGPIE_GATEWAY_MASTER_KEY
#                             (see packages/gateway/README.md) — one shared
#                             secret known to both processes. It is NOT the real
#                             OpenRouter key (that is the gateway's
#                             MAGPIE_GATEWAY_OPENROUTER_KEY, which this
#                             orchestrator never has or needs). Generate it
#                             once with `openssl rand -hex 32` and use the
#                             SAME value for both env files.
# ---------------------------------------------------------------------------
#
# NOTE (M4-C): there is deliberately no MAGPIE_LLM_API_KEY here. The real
# OpenRouter key now lives ONLY in the gateway process's own environment
# (MAGPIE_GATEWAY_OPENROUTER_KEY, see packages/gateway/README.md) — this
# orchestrator mints a short-lived, budget-capped per-job virtual key against
# the gateway's management plane instead of ever holding a long-lived
# provider credential itself. See [gateway] below.
# ---------------------------------------------------------------------------
#
# The Milestone 4 credential-injecting LLM gateway (PLAN.md §5) is a SEPARATE
# service — packages/gateway (@magpie/gateway) — with its OWN env vars, read
# by its OWN process (never this orchestrator config or process):
# MAGPIE_GATEWAY_OPENROUTER_KEY (the real provider key), the shared
# MAGPIE_GATEWAY_MASTER_KEY above, and non-secret GATEWAY_* settings. See
# packages/gateway/README.md for the full list and the security rationale for
# keeping the provider key out of both this file and this process.
# ---------------------------------------------------------------------------

# List of "owner/repo" pairs that magpie is allowed to automatically review.
# Required — the array itself must be present (an empty array is valid, and
# means "review nothing yet"), so an operator must consciously opt repos in
# rather than magpie silently reviewing every repo the GitHub App is
# installed on.
# NOTE: this is a top-level key, so it must stay ABOVE the first [section]
# header — TOML assigns bare keys appearing after a header to that section.
repo_allowlist = [
  # "my-org/my-repo",
]

[github]
# GitHub App ID, shown on the app's settings page. Required.
app_id = "123456"

# Path to the GitHub App private key (.pem), used to mint installation
# tokens. Required, UNLESS the MAGPIE_GITHUB_PRIVATE_KEY env var supplies the
# key contents directly (in which case this field is ignored).
private_key_path = "/etc/magpie/github-app.private-key.pem"

[llm]
# Base URL of the OpenAI-compatible LLM API the reviewer talks to.
# Default: "https://openrouter.ai/api/v1"
base_url = "https://openrouter.ai/api/v1"

# Model identifier to request from the provider. Required.
# Example: "anthropic/claude-sonnet-4.5"
model = "anthropic/claude-sonnet-4.5"

[server]
# Host/interface the webhook HTTP server listens on.
# Default: "127.0.0.1" (localhost only; expose via Cloudflare Tunnel, not by
# binding a public interface).
host = "127.0.0.1"

# Port the webhook HTTP server listens on.
# Default: 8787
port = 8787

[limits]
# Hard wall-clock timeout for a single review job, in seconds. A job that
# exceeds this is killed (container stopped, workspace deleted).
# Default: 600 (10 minutes)
job_timeout_seconds = 600

# Maximum number of review jobs the orchestrator will run at once.
# Default: 2
concurrency = 2

# Diff-size cap, in changed lines. PRs whose diff exceeds this are skipped or
# summarized only, rather than fully reviewed, to bound cost and latency.
# Default: 4000
max_diff_lines = 4000

[workspace]
# Directory where PR checkouts are cloned for review jobs.
# Default: "/var/lib/magpie/work"
# For local development, point this at a directory under your home or repo
# checkout (e.g. "./.magpie-work") instead of the production system path.
work_dir = "/var/lib/magpie/work"

[container]
# Reviewer image the review container runs (the ONLY container in the product;
# orchestrator + gateway are host services). As of M7-2 this is PUBLISHED to
# GHCR — built multi-arch (amd64+arm64) and cosign-signed with SLSA provenance
# by .github/workflows/release-reviewer.yml on `reviewer-v*` tags — so adopters
# `docker pull` it rather than building locally. The value below is PINNED BY
# DIGEST (the `@sha256:` is the multi-arch image-index digest, so a re-tagged
# upstream image can't silently swap the untrusted-content runtime under you);
# the `:0.2.0` tag is human-readable provenance only. Verify the signature
# before trusting a new digest (see docker/reviewer/README.md, "Published
# image"). `scripts/build-reviewer-image.sh` is now for LOCAL DEVELOPMENT ONLY
# (it builds a `magpie-reviewer:*` image you'd point this at instead).
# Default: "ghcr.io/andrew-craig/magpie/reviewer:0.2.0@sha256:e6a6e118ce46392dffaf172afa35af2ff6c8ff375d37dd403e9d6ac77c1f3aed"
image = "ghcr.io/andrew-craig/magpie/reviewer:0.2.0@sha256:e6a6e118ce46392dffaf172afa35af2ff6c8ff375d37dd403e9d6ac77c1f3aed"

# Memory limit passed to `docker run --memory` for the review container.
# Bounds how much host memory a single (possibly prompt-injected) review job
# can consume. See PLAN.md §4 for the container hardening rationale.
# Default: "4g"
memory = "4g"

# CPU limit passed to `docker run --cpus` for the review container.
# Default: "2"
cpus = "2"

# Max number of processes/threads the review container may create, passed to
# `docker run --pids-limit`. Bounds fork-bomb-style resource exhaustion.
# Default: 256
pids_limit = 256

# Path (or PATH name) of the CLI used to run review containers. As of
# Milestone 8 (M8-B2) this defaults to `podman`, run ROOTLESS: no root daemon
# and no `docker` group, so a compromised orchestrator can't reach a
# root-privileged runtime. The one rootless-only difference — `--userns=keep-id`,
# so the container can write findings back to the orchestrator's own uid — is
# added automatically when this binary's basename is `podman`; every hardened
# flag (`--cap-drop=ALL`, `--read-only`, `--network none`, `--pids-limit`, …) is
# identical to the docker path. Set this to `docker` (or a docker-compatible
# CLI / full path) to use the rootful docker runtime instead.
#   Rootless podman prerequisites (installer automation is M8-D3): the service
#   user needs /etc/subuid + /etc/subgid ranges and `loginctl enable-linger`.
#   Note also that `--memory` requires the `memory` cgroup v2 controller to be
#   delegated to the user; where it is absent (e.g. some Raspberry Pi kernels
#   boot with the memory controller disabled) crun fails closed rather than
#   silently ignoring the limit the way rootful docker does.
# Default: "podman"
docker_bin = "podman"

# NOTE: there is deliberately no `network` field. As of Milestone 7 (Design D,
# DISTRIBUTION.md §2) the review container is ALWAYS launched with
# `--network none` — it has no network interfaces at all, only loopback. Its
# one channel to the outside is a per-job unix domain socket the gateway binds
# and the orchestrator bind-mounts read-only into the container (see
# reviewer.ts and packages/gateway/src/job-sockets.ts). This replaces the
# old M4 `magpie-net` bridge + iptables egress lockdown entirely: with no
# network namespace there is no bridge, subnet, or firewall left to provision,
# so scripts/setup-network.sh and magpie-firewall.service were deleted. Egress
# confinement is now a kernel network-namespace property, not a config toggle.

[gateway]
# Credential-injecting LLM gateway (M4, PLAN.md §5; packages/gateway). The
# orchestrator mints a fresh, budget-capped, short-lived virtual key on this
# gateway before every review run and revokes it on cleanup (see gateway.ts) —
# the review container authenticates to the gateway's PROXY plane with that
# virtual key instead of ever holding the real OpenRouter key. The master key
# authenticating these calls is the MAGPIE_GATEWAY_MASTER_KEY env secret
# documented at the top of this file, not a field here.

# Base URL of the gateway's MANAGEMENT (control) plane, used ONLY by this
# orchestrator to mint/revoke virtual keys (POST/DELETE /admin/keys). The
# gateway binds this plane to loopback only (see packages/gateway/README.md),
# so this is a 127.0.0.1 URL. This is NOT the proxy/data-plane URL the review
# container talks to — see container_base_url below for that.
# Default: "http://127.0.0.1:4100" (matches the gateway's default mgmt port).
base_url = "http://127.0.0.1:4100"

# Base URL the review CONTAINER points Pi at for chat-completions, via
# `-e OPENAI_BASE_URL=...` on `docker run` (see reviewer.ts). Under Design D
# (M7) the container has no network, so this is a LOOPBACK address inside the
# container: a tiny in-container TCP->unix forwarder listens on 127.0.0.1:4000
# and relays every request to the gateway's per-job unix socket mounted at
# /run/gw/gw.sock (see docker/reviewer/forwarder.mjs and entrypoint.sh). The
# gateway serves the SAME proxy-plane handler over that socket as it used to
# serve over the old magpie-net IP; only the transport changed. Deliberately
# still separate from base_url above (the loopback-only mgmt plane).
# Default: "http://127.0.0.1:4000/v1" — the in-container forwarder's listener,
# with the /v1 suffix Pi's OpenAI-compatible provider config expects.
container_base_url = "http://127.0.0.1:4000/v1"

# Per-job spend cap, in USD, for each minted virtual key. This is the HARD
# cost cap Pi itself lacks (no --max-turns/budget flag): once a job's key has
# spent this much, the gateway refuses the next request with HTTP 402, which
# surfaces as a "review failed" comment on the PR rather than silent runaway
# spend. Tune to your provider/model pricing and typical diff size.
# Default: 0.50
per_job_budget_usd = 0.5

# Extra seconds added on top of limits.job_timeout_seconds for a minted key's
# TTL, so the key comfortably outlives the review run (including the container
# SIGTERM->SIGKILL grace and the queue's own backstop timeout) and is always
# cleaned up by an explicit revoke on cleanup rather than expiring mid-review.
# Default: 120
ttl_margin_seconds = 120

[telemetry]
# Per-job cost/outcome telemetry (M5-D, PLAN.md §6). After EVERY review
# (success or failure), Magpie emits exactly one structured, greppable record
# per job — repo, PR number, head SHA, outcome, wall-clock duration, Pi's
# self-reported token usage, and the AUTHORITATIVE cost (the gateway's own
# tracked spend for the job's virtual key, not Pi's self-report). The record
# is always written as one JSON log line (captured by journald/systemd with no
# extra setup) AND best-effort appended as one JSONL line to the file below.
#
# The `outcome` field distinguishes runaway-cost patterns at a glance:
# success / diff-too-large / already-reviewed / head-sha-mismatch /
# timeout-kill / aborted / budget-exhausted / error.
#
# If this path isn't writable (e.g. a dev box without /var/lib/magpie), the
# JSONL append is skipped with a logged warning — the job is NOT failed, and
# the same record is still on the log line. No dashboards are in scope; one
# `grep telemetry.jsonl` (or `journalctl | grep job-telemetry`) is the query
# interface.
# Default: "/var/lib/magpie/telemetry.jsonl"
# For local development, point this under your repo checkout or home dir.
path = "/var/lib/magpie/telemetry.jsonl"
