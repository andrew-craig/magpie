# Magpie orchestrator configuration.
#
# Copy this file to `config.toml` (repo-root, git-ignored) and fill it in, or
# point MAGPIE_CONFIG at a config file living elsewhere. See packages/orchestrator/src/config.ts
# for the loader that parses and validates this file.
#
# ---------------------------------------------------------------------------
# Secrets — deliberately kept OUT of this file and read from the environment
# instead, so `config.toml` never needs to hold anything sensitive:
#
#   MAGPIE_WEBHOOK_SECRET     (required) GitHub App webhook secret, used to
#                             verify the X-Hub-Signature-256 header on
#                             incoming webhook deliveries.
#
#   MAGPIE_LLM_API_KEY        (required for now) API key for the LLM provider
#                             configured in [llm] below. This is the *real*
#                             provider key; once the M4 gateway is wired into
#                             the orchestrator (M4-B/D), it will mint
#                             short-lived per-job virtual keys against
#                             packages/gateway instead and this will stop
#                             being a long-lived secret. Until then, treat it
#                             as sensitive.
#
#   MAGPIE_GITHUB_PRIVATE_KEY (optional) PEM contents of the GitHub App
#                             private key. If set, this takes priority over
#                             `github.private_key_path` below and the file on
#                             disk is never read. Useful for containerized or
#                             CI deployments where mounting a PEM file is
#                             awkward.
# ---------------------------------------------------------------------------
#
# The Milestone 4 credential-injecting LLM gateway (PLAN.md §5) is a SEPARATE
# service — packages/gateway (@magpie/gateway) — with its OWN env vars, read
# by its OWN process (never this orchestrator config or process):
# MAGPIE_GATEWAY_OPENROUTER_KEY, MAGPIE_GATEWAY_MASTER_KEY, and non-secret
# GATEWAY_* settings. See packages/gateway/README.md for the full list and
# the security rationale for keeping them out of this file.
# ---------------------------------------------------------------------------

# List of "owner/repo" pairs that magpie is allowed to automatically review.
# Required — the array itself must be present (an empty array is valid, and
# means "review nothing yet"), so an operator must consciously opt repos in
# rather than magpie silently reviewing every repo the GitHub App is
# installed on.
# NOTE: this is a top-level key, so it must stay ABOVE the first [section]
# header — TOML assigns bare keys appearing after a header to that section.
repo_allowlist = [
  # "my-org/my-repo",
]

[github]
# GitHub App ID, shown on the app's settings page. Required.
app_id = "123456"

# Path to the GitHub App private key (.pem), used to mint installation
# tokens. Required, UNLESS the MAGPIE_GITHUB_PRIVATE_KEY env var supplies the
# key contents directly (in which case this field is ignored).
private_key_path = "/etc/magpie/github-app.private-key.pem"

[llm]
# Base URL of the OpenAI-compatible LLM API the reviewer talks to.
# Default: "https://openrouter.ai/api/v1"
base_url = "https://openrouter.ai/api/v1"

# Model identifier to request from the provider. Required.
# Example: "anthropic/claude-sonnet-4.5"
model = "anthropic/claude-sonnet-4.5"

[server]
# Host/interface the webhook HTTP server listens on.
# Default: "127.0.0.1" (localhost only; expose via Cloudflare Tunnel, not by
# binding a public interface).
host = "127.0.0.1"

# Port the webhook HTTP server listens on.
# Default: 8787
port = 8787

[limits]
# Hard wall-clock timeout for a single review job, in seconds. A job that
# exceeds this is killed (container stopped, workspace deleted).
# Default: 600 (10 minutes)
job_timeout_seconds = 600

# Maximum number of review jobs the orchestrator will run at once.
# Default: 2
concurrency = 2

# Diff-size cap, in changed lines. PRs whose diff exceeds this are skipped or
# summarized only, rather than fully reviewed, to bound cost and latency.
# Default: 4000
max_diff_lines = 4000

[workspace]
# Directory where PR checkouts are cloned for review jobs.
# Default: "/var/lib/magpie/work"
# For local development, point this at a directory under your home or repo
# checkout (e.g. "./.magpie-work") instead of the production system path.
work_dir = "/var/lib/magpie/work"

[container]
# Docker image tag the review container runs (see PLAN.md Milestone 3). This
# MUST match the tag produced by the magpie-reviewer image build (docker/) —
# the orchestrator does not build or pull the image itself.
# Default: "magpie-reviewer:0.1.0"
image = "magpie-reviewer:0.1.0"

# Memory limit passed to `docker run --memory` for the review container.
# Bounds how much host memory a single (possibly prompt-injected) review job
# can consume. See PLAN.md §4 for the container hardening rationale.
# Default: "4g"
memory = "4g"

# CPU limit passed to `docker run --cpus` for the review container.
# Default: "2"
cpus = "2"

# Max number of processes/threads the review container may create, passed to
# `docker run --pids-limit`. Bounds fork-bomb-style resource exhaustion.
# Default: 256
pids_limit = 256

# Path to the docker CLI binary used to run review containers. Override this
# on hosts where `docker` isn't on PATH, or where a docker-compatible CLI
# (e.g. podman) is used instead.
# Default: "docker"
docker_bin = "docker"

# Docker network the review container is attached to, via `docker run
# --network`. Default: "bridge" (Docker's default bridge network). Milestone
# 4 introduces a dedicated `magpie-net` bridge with host iptables egress
# lockdown (see PLAN.md §5) — this field exists now so flipping to it later
# is a config change, not a code change.
network = "bridge"
