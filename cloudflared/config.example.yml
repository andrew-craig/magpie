# cloudflared ingress configuration TEMPLATE for magpie's webhook tunnel.
#
# This is a template, not a real config: it contains no secrets and no real
# hostname. scripts/setup-cloudflared.sh renders this into
# /etc/cloudflared/config.yml, substituting the values below for your actual
# tunnel name/UUID, hostname, and credentials-file path. You can also do this
# by hand (copy this file to /etc/cloudflared/config.yml and edit it) if you
# prefer not to run the script.
#
# See docs/cloudflared.md for the full setup runbook.

# Name of the named tunnel (as passed to `cloudflared tunnel create <name>`).
# Matches MAGPIE_TUNNEL_NAME in scripts/setup-cloudflared.sh (default: magpie).
tunnel: magpie

# Path to the tunnel's credentials JSON, generated by `cloudflared tunnel
# create` and written under ~/.cloudflared/<TUNNEL-UUID>.json for the user
# that ran `cloudflared tunnel login`. This file is a SECRET — it is never
# committed to this repo; only its path is referenced here. Replace <USER>
# and <TUNNEL-UUID> with your actual values.
credentials-file: /home/<USER>/.cloudflared/<TUNNEL-UUID>.json

# Ingress rules are evaluated top-to-bottom; the first matching hostname
# wins, and a catch-all is required as the last rule.
ingress:
  # Public hostname GitHub will send webhook deliveries to. Replace with
  # your real hostname (must be on a zone whose DNS is managed by
  # Cloudflare). This is operator-specific — never hardcode a real domain
  # in a committed config; this file must stay a placeholder.
  - hostname: magpie.example.com
    # Forwards to the magpie orchestrator, which binds to 127.0.0.1:8787 by
    # default (see config.toml [server]). This MUST stay loopback — the
    # tunnel is what makes it reachable from the internet, not a public
    # bind address. Do not change the orchestrator to listen on 0.0.0.0.
    service: http://localhost:8787
    # Deliberately NOT configuring Cloudflare Access / Zero Trust auth on
    # this hostname: GitHub webhook deliveries are unauthenticated HTTP
    # POSTs that authenticate via the X-Hub-Signature-256 HMAC header,
    # verified by the orchestrator itself (packages/orchestrator/src/server.ts).
    # An Access policy in front of this hostname would block every GitHub
    # delivery. If you want extra defense-in-depth, restrict access at the
    # Cloudflare WAF/firewall-rules layer instead, scoped to GitHub's
    # published webhook source IP ranges (https://api.github.com/meta,
    # "hooks" key) — that's a network-layer allowlist, not an auth
    # challenge, so it doesn't break unauthenticated GitHub deliveries.
    # This is optional belt-and-suspenders, not required.

  # Catch-all: cloudflared requires a final rule with no hostname. Anything
  # not matched above (including requests to this tunnel's *.trycloudflare
  # or other stray hostnames) gets a 404 instead of being forwarded.
  - service: http_status:404
